name: Blog Publish

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        uses: devcontainers/ci@v0.3
        with:
          runCmd: hugo -s blog --minify --baseURL "https://p4lang.github.io/gsoc/blog/"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to gh-pages
        run: |
          # Remove old blog files but preserve pr-preview/
          find gh-pages/blog -maxdepth 1 -not -name blog -not -name pr-preview -exec rm -rf {} +  2>/dev/null || true
          mkdir -p gh-pages/blog
          cp -r blog/public/* gh-pages/blog/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog
          git commit -m "Publish blog" || exit 0
          git push
